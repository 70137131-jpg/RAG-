services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_chat_logs
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_chat_logs"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://rag:rag_password@postgres:5432/rag_chat_logs
      - CHAT_LOG_RETENTION_DAYS=7
      - ADMIN_API_TOKEN=${API_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
